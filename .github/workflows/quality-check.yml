name: quality-check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Python syntax compile
        run: python -m compileall backend
      - name: Python import smoke tests
        run: |
          python - <<'PY'
          import importlib
          modules = [
              "backend.main",
              "backend.api.routes",
              "backend.api.stream",
              "backend.core.orchestrator",
              "backend.tools.registry",
          ]
          for mod in modules:
              importlib.import_module(mod)
          print("Backend import smoke checks passed")
          PY

  gui-build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install GUI dependencies
        run: npm install
      - name: Build GUI
        run: npm run build
        env:
          GITHUB_PAGES: "true"
